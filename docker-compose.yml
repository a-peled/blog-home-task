services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  wordpress:
    build:
      context: ./docker
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/uploads:/var/www/html/wp-content/uploads
    entrypoint: >
      bash -c "docker-entrypoint.sh apache2-foreground & sleep 30 && /usr/local/bin/setup.sh && wait"

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        WORDPRESS_API_URL: http://wordpress:80/graphql
    ports:
      - "3000:3000"
    depends_on:
      - wordpress
    env_file:
      - .env
    environment:
      WORDPRESS_API_URL: http://wordpress:80/graphql
    volumes:
      - wordpress_data:/var/www/html
    command: >
      sh -c "
        until [ -f /var/www/html/wp-content/app-password.txt ]; do
          echo 'Waiting for WordPress to generate the app password...'
          sleep 2
        done
        export WORDPRESS_APP_PASSWORD=\$(cat /var/www/html/wp-content/app-password.txt)
        echo '=========================================='
        echo ' App password loaded, starting Next.js.'
        echo ' Blog is ready at http://localhost:3000'
        echo '=========================================='
        npm start
      "

volumes:
  db_data:
  wordpress_data:
